{% extends "base.html" %}

{% block title %}Upload findings{% endblock %}

{% block content %}
<h1>Upload an ISD CSV export</h1>
<p class="page-intro">
  Rows where <code>Issue Category</code> is "Internal Vulnerabilities" are
  parsed and added to the findings list; other rows are skipped.
</p>

{% if error %}
<p class="upload-error">{{ error }}</p>
{% endif %}

<form method="post" enctype="multipart/form-data" class="upload-form">
  <input type="file" name="csv_file" accept=".csv" required>
  <button type="submit">Upload and process</button>
</form>
{% endblock %}
